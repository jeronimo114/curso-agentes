<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="-apple-system, Segoe UI, sans-serif">
  <rect width="900" height="560" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="50" y="45" font-size="22" font-weight="700" fill="#0B0B0F">Ingresos trimestrales y margen operativo · 2024-2026</text>
  <text x="50" y="70" font-size="13" fill="#5B5F6A">Cifras en millones de USD · Empresa B2B SaaS LATAM</text>

  <!-- Y axis label left -->
  <text x="20" y="320" font-size="11" fill="#5B5F6A" transform="rotate(-90 20 320)">Ingresos (M USD)</text>
  <!-- Y axis label right -->
  <text x="880" y="320" font-size="11" fill="#5B5F6A" transform="rotate(90 880 320)">Margen operativo (%)</text>

  <!-- Plot area -->
  <g transform="translate(70,100)">
    <!-- Grid lines + Y-axis labels -->
    <g stroke="#E5E7EB" stroke-width="1">
      <line x1="0" y1="0"   x2="780" y2="0"/>
      <line x1="0" y1="80"  x2="780" y2="80"/>
      <line x1="0" y1="160" x2="780" y2="160"/>
      <line x1="0" y1="240" x2="780" y2="240"/>
      <line x1="0" y1="320" x2="780" y2="320"/>
      <line x1="0" y1="400" x2="780" y2="400"/>
    </g>
    <g font-size="11" fill="#5B5F6A">
      <text x="-8" y="4"   text-anchor="end">25</text>
      <text x="-8" y="84"  text-anchor="end">20</text>
      <text x="-8" y="164" text-anchor="end">15</text>
      <text x="-8" y="244" text-anchor="end">10</text>
      <text x="-8" y="324" text-anchor="end">5</text>
      <text x="-8" y="404" text-anchor="end">0</text>
    </g>
    <g font-size="11" fill="#5B5F6A">
      <text x="788" y="4"   text-anchor="start">40%</text>
      <text x="788" y="84"  text-anchor="start">32%</text>
      <text x="788" y="164" text-anchor="start">24%</text>
      <text x="788" y="244" text-anchor="start">16%</text>
      <text x="788" y="324" text-anchor="start">8%</text>
      <text x="788" y="404" text-anchor="start">0%</text>
    </g>

    <!-- X-axis labels (12 trimestres) -->
    <g font-size="11" fill="#5B5F6A">
      <text x="32"  y="425" text-anchor="middle">Q1·24</text>
      <text x="97"  y="425" text-anchor="middle">Q2·24</text>
      <text x="162" y="425" text-anchor="middle">Q3·24</text>
      <text x="227" y="425" text-anchor="middle">Q4·24</text>
      <text x="292" y="425" text-anchor="middle">Q1·25</text>
      <text x="357" y="425" text-anchor="middle">Q2·25</text>
      <text x="422" y="425" text-anchor="middle">Q3·25</text>
      <text x="487" y="425" text-anchor="middle">Q4·25</text>
      <text x="552" y="425" text-anchor="middle">Q1·26</text>
      <text x="617" y="425" text-anchor="middle">Q2·26</text>
      <text x="682" y="425" text-anchor="middle">Q3·26</text>
      <text x="747" y="425" text-anchor="middle">Q4·26</text>
    </g>

    <!-- INGRESOS BARS (teal) -->
    <!-- Values: 8, 9.2, 10.5, 11.8, 12.4, 13.1, 14.0, 16.2, 18.5, 17.0, 19.8, 22.6  (M USD) -->
    <!-- Y-scale: 25 -> 0; 0 -> 400. So y = 400 - (val/25)*400 -->
    <g fill="#048dad">
      <rect x="14"  y="272" width="36" height="128"/>  <!-- 8.0 -->
      <rect x="79"  y="253" width="36" height="147"/>  <!-- 9.2 -->
      <rect x="144" y="232" width="36" height="168"/>  <!-- 10.5 -->
      <rect x="209" y="211" width="36" height="189"/>  <!-- 11.8 -->
      <rect x="274" y="202" width="36" height="198"/>  <!-- 12.4 -->
      <rect x="339" y="190" width="36" height="210"/>  <!-- 13.1 -->
      <rect x="404" y="176" width="36" height="224"/>  <!-- 14.0 -->
      <rect x="469" y="141" width="36" height="259"/>  <!-- 16.2 -->
      <rect x="534" y="104" width="36" height="296"/>  <!-- 18.5 -->
      <rect x="599" y="128" width="36" height="272"/>  <!-- 17.0 dip -->
      <rect x="664" y="83"  width="36" height="317"/>  <!-- 19.8 -->
      <rect x="729" y="38"  width="36" height="362"/>  <!-- 22.6 -->
    </g>

    <!-- MARGEN line (gold) -->
    <!-- Values: 18%, 19%, 20%, 22%, 24%, 25%, 26%, 28%, 31%, 22%, 28%, 33% -->
    <!-- Right scale: 40% -> 0, 0% -> 400. y = 400 - (pct/40)*400 -->
    <polyline fill="none" stroke="#ccad00" stroke-width="3"
      points="32,220 97,210 162,200 227,180 292,160 357,150 422,140 487,120 552,90 617,180 682,120 747,70"/>
    <g fill="#ccad00">
      <circle cx="32"  cy="220" r="4"/>
      <circle cx="97"  cy="210" r="4"/>
      <circle cx="162" cy="200" r="4"/>
      <circle cx="227" cy="180" r="4"/>
      <circle cx="292" cy="160" r="4"/>
      <circle cx="357" cy="150" r="4"/>
      <circle cx="422" cy="140" r="4"/>
      <circle cx="487" cy="120" r="4"/>
      <circle cx="552" cy="90"  r="5" stroke="#fff" stroke-width="1.5"/>
      <circle cx="617" cy="180" r="5" stroke="#fff" stroke-width="1.5"/>
      <circle cx="682" cy="120" r="4"/>
      <circle cx="747" cy="70"  r="4"/>
    </g>

    <!-- Annotation arrow on Q2-26 dip -->
    <line x1="617" y1="200" x2="617" y2="240" stroke="#C93A3A" stroke-width="1.5"/>
    <text x="617" y="258" text-anchor="middle" font-size="11" fill="#C93A3A" font-weight="600">caída atípica</text>
  </g>

  <!-- Legend -->
  <g transform="translate(70,520)" font-size="12" fill="#0B0B0F">
    <rect x="0" y="-10" width="14" height="14" fill="#048dad"/>
    <text x="20" y="2">Ingresos (M USD)</text>
    <line x1="160" y1="-3" x2="190" y2="-3" stroke="#ccad00" stroke-width="3"/>
    <circle cx="175" cy="-3" r="4" fill="#ccad00"/>
    <text x="200" y="2">Margen operativo (%)</text>
  </g>
</svg>
