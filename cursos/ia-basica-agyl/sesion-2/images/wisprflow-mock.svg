<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F1E8"/>
      <stop offset="100%" stop-color="#E8E2D0"/>
    </linearGradient>
  </defs>
  <rect width="880" height="540" fill="url(#bg)"/>

  <!-- top bar -->
  <rect x="0" y="0" width="880" height="34" fill="#1a3329"/>
  <text x="440" y="22" text-anchor="middle" font-size="11" fill="#d1e8da">Don't type, just speak — voice-to-text AI for any app</text>

  <!-- nav -->
  <text x="40" y="78" font-size="20" font-weight="700" fill="#1a3329">w · Flow</text>
  <g font-size="13" fill="#1a3329">
    <text x="380" y="78">Product</text>
    <text x="450" y="78">Individuals</text>
    <text x="525" y="78">Business</text>
    <text x="595" y="78">Resources</text>
    <text x="675" y="78">Flow for Android</text>
  </g>
  <rect x="775" y="60" width="80" height="28" rx="14" fill="#1a3329"/>
  <text x="815" y="78" text-anchor="middle" font-size="11" fill="#fff">Download for macOS</text>

  <!-- Hero -->
  <text x="440" y="210" text-anchor="middle" font-size="56" font-weight="800" fill="#1a3329" font-style="italic">Don't type,</text>
  <text x="440" y="270" text-anchor="middle" font-size="56" font-weight="800" fill="#1a3329" font-style="italic">just speak.</text>

  <text x="440" y="310" text-anchor="middle" font-size="14" fill="#5a6b62">The voice-to-text AI that turns speech into clear,</text>
  <text x="440" y="328" text-anchor="middle" font-size="14" fill="#5a6b62">polished writing in every app.</text>

  <!-- CTA -->
  <rect x="370" y="358" width="140" height="36" rx="18" fill="#2a8159"/>
  <circle cx="392" cy="376" r="6" fill="#fff"/>
  <text x="440" y="381" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Saved name</text>

  <text x="440" y="412" text-anchor="middle" font-size="11" fill="#5a6b62">Available on Mac, Windows, iPhone and Android</text>

  <!-- Voice waveform mock -->
  <g transform="translate(290,440)">
    <rect x="0" y="0" width="300" height="40" rx="8" fill="#fff" stroke="#d8d2c0"/>
    <g fill="#2a8159">
      <rect x="20"  y="14" width="2" height="12"/>
      <rect x="28"  y="10" width="2" height="20"/>
      <rect x="36"  y="6"  width="2" height="28"/>
      <rect x="44"  y="12" width="2" height="16"/>
      <rect x="52"  y="4"  width="2" height="32"/>
      <rect x="60"  y="14" width="2" height="12"/>
      <rect x="68"  y="8"  width="2" height="24"/>
      <rect x="76"  y="12" width="2" height="16"/>
      <rect x="84"  y="2"  width="2" height="36"/>
      <rect x="92"  y="14" width="2" height="12"/>
      <rect x="100" y="8"  width="2" height="24"/>
      <rect x="108" y="10" width="2" height="20"/>
      <rect x="116" y="14" width="2" height="12"/>
      <rect x="124" y="6"  width="2" height="28"/>
      <rect x="132" y="14" width="2" height="12"/>
      <rect x="140" y="10" width="2" height="20"/>
      <rect x="148" y="4"  width="2" height="32"/>
      <rect x="156" y="14" width="2" height="12"/>
      <rect x="164" y="8"  width="2" height="24"/>
      <rect x="172" y="12" width="2" height="16"/>
      <rect x="180" y="14" width="2" height="12"/>
      <rect x="188" y="2"  width="2" height="36"/>
      <rect x="196" y="14" width="2" height="12"/>
      <rect x="204" y="10" width="2" height="20"/>
      <rect x="212" y="6"  width="2" height="28"/>
      <rect x="220" y="14" width="2" height="12"/>
      <rect x="228" y="8"  width="2" height="24"/>
      <rect x="236" y="12" width="2" height="16"/>
      <rect x="244" y="14" width="2" height="12"/>
      <rect x="252" y="4"  width="2" height="32"/>
      <rect x="260" y="14" width="2" height="12"/>
      <rect x="268" y="10" width="2" height="20"/>
      <rect x="276" y="14" width="2" height="12"/>
    </g>
  </g>

  <!-- Circular text deco -->
  <g opacity="0.4" fill="#1a3329" font-size="10" font-weight="600">
    <text transform="translate(80,200) rotate(-45)">Just speak</text>
    <text transform="translate(770,180) rotate(35)">Faster than typing</text>
  </g>
